<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>戰鬥陀螺大賽級戰績社群網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        input, select, button { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 font-sans antialiased pb-12">

    <div class="container mx-auto px-3 py-4 max-w-xl">
        <header class="mb-4 border-b border-slate-700 pb-3 flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-black text-indigo-400 tracking-wider">🌪️ 陀螺大賽戰績社群網</h1>
                    <p class="text-slate-400 text-xs mt-0.5">多用戶雲端版 • 支援 Google 一鍵登入</p>
                </div>
                <div id="user-status-area" class="text-right"></div>
            </div>
        </header>

        <div id="auth-section" class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl space-y-4">
            <div class="text-center space-y-1">
                <h3 class="text-md font-bold text-slate-200">🏆 歡迎來到全台陀螺選手戰績庫</h3>
                <p class="text-xs text-slate-400">註冊專屬帳號，即可擁有個人化大數據分析與隨身雲端筆記。</p>
            </div>
            
            <button id="btn-google" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-bold text-xs py-2.5 rounded-lg transition h-11 flex items-center justify-center gap-2 border border-slate-300 shadow-sm">
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.327-3.2A12.986 12.986 0 0 0 12.24 0c-7.18 0-13 5.82-13 13s5.82 13 13 13c7.5 0 12.48-5.26 12.48-12.69 0-.85-.09-1.5-.2-2.025H12.24z"/>
                </svg>
                使用 Google 帳號一鍵登入 / 註冊
            </button>

            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="flex-shrink mx-3 text-slate-500 text-[10px] font-bold">或使用傳統信箱</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>

            <div class="space-y-2">
                <input type="email" id="auth-email" placeholder="輸入電子信箱 Email" class="w-full p-2.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 outline-none h-10">
                <input type="password" id="auth-password" placeholder="密碼 (至少 6 位數)" class="w-full p-2.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 outline-none h-10">
                
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <button id="btn-login" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-2.5 rounded-lg transition h-10">
                        🔑 登入帳號
                    </button>
                    <button id="btn-signup" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-bold py-2.5 rounded-lg transition h-10 border border-slate-600">
                        📝 註冊新帳號
                    </button>
                </div>
            </div>
        </div>

        <div id="main-app-section" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center">
                    <div class="text-[10px] text-slate-400 font-bold">您的總參賽場次</div>
                    <div id="stat-total" class="text-sm font-black text-indigo-400 mt-1">0 場</div>
                </div>
                <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-center">
                    <div class="text-[10px] text-slate-400 font-bold">全站最愛用陀螺熱門榜</div>
                    <div id="stat-top-beys" class="text-xs font-bold text-amber-400 mt-1 truncate">計算中...</div>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <h2 id="form-title" class="text-sm font-extrabold text-slate-200 mb-3 border-b border-slate-700 pb-2">📝 登錄新賽事</h2>
                <form id="match-form" class="space-y-3.5">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1">比賽日期</label>
                            <input type="date" id="date" required class="w-full p-2 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 outline-none h-9">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1">比賽名稱</label>
                            <input type="text" id="tournament" placeholder="例如：金典 G3 店賽" required class="w-full p-2 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 outline-none h-9">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1">總人數</label>
                            <input type="text" id="players" placeholder="64人" class="w-full p-2 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 outline-none h-9">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1">報名費 ($)</label>
                            <input type="number" id="fee" placeholder="0" class="w-full p-2 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 outline-none h-9">
                        </div>
                    </div>

                    <div class="bg-blue-950/40 p-3 rounded-xl border border-blue-900/40 space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[11px] font-black text-blue-400 block">🛡️ 我方此戰登記陀螺庫</span>
                            <button type="button" id="btn-add-my-bey" class="bg-blue-600/80 hover:bg-blue-500 text-white font-bold text-[10px] px-2 py-0.5 rounded transition">➕ 新增陀螺</button>
                        </div>
                        <div id="my-beys-container" class="grid grid-cols-2 gap-1.5">
                            <input type="text" class="my-bey-input w-full p-1.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 text-center h-8" placeholder="我方陀螺 1" required>
                            <input type="text" class="my-bey-input w-full p-1.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 text-center h-8" placeholder="我方陀螺 2">
                        </div>
                    </div>

                    <div id="stages-container" class="space-y-3"></div>
                    <button type="button" id="btn-add-stage" class="w-full py-2 bg-slate-700 text-emerald-400 text-xs font-bold rounded-lg border border-dashed border-emerald-500/40 h-9">+ 新增下一輪賽事</button>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-lg text-xs h-11 tracking-wider">💾 儲存至雲端個人戰績庫</button>
                </form>
            </div>

            <div class="space-y-2">
                <h2 class="text-xs font-extrabold text-slate-400 uppercase tracking-wider">🔍 您的歷史戰績紀錄</h2>
                <div id="records-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const url_config = "https://erfhyiptjwodutdwxitb.supabase.co";
        const key_config = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZmh5aXB0andvZHV0ZHd4aXRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTE0MTUsImV4cCI6MjA5OTA4NzQxNX0.8xT-uHvCyw61JZ4qDihz5j2F0sd6ROWpr_1kt2ELgEc";

        const gyroSupabase = window.supabase.createClient(url_config, key_config);
        let currentUser = null;
        let myMatches = [];

        // 監聽登入狀態
        gyroSupabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-app-section').classList.remove('hidden');
                const userName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
                document.getElementById('user-status-area').innerHTML = `
                    <span class="text-xs font-bold text-emerald-400 block">👋 嗨，${userName}</span>
                    <button id="btn-logout" class="text-[10px] text-slate-500 underline hover:text-rose-400">登出帳號</button>
                `;
                
                document.getElementById('btn-logout').addEventListener('click', async () => {
                    await gyroSupabase.auth.signOut();
                });

                fetchUserMatches();
            } else {
                currentUser = null;
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-app-section').classList.add('hidden');
                document.getElementById('user-status-area').innerHTML = `<span class="text-xs font-bold text-rose-400">🔴 未登入</span>`;
            }
        });

        // 登入按鈕事件
        document.getElementById('btn-google').addEventListener('click', async () => {
            await gyroSupabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        });

        document.getElementById('btn-signup').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert('信箱與密碼都要填寫喔！');
            const { error } = await gyroSupabase.auth.signUp({ email, password });
            if (error) alert('註冊失敗: ' + error.message);
            else alert('註冊成功！系統已自動幫您登入。');
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await gyroSupabase.auth.signInWithPassword({ email, password });
            if (error) alert('登入失敗: ' + error.message);
        });

        document.getElementById('btn-add-my-bey').addEventListener('click', () => {
            const container = document.getElementById('my-beys-container');
            const beyCount = container.querySelectorAll('.my-bey-input').length + 1;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'my-bey-input w-full p-1.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 text-center h-8';
            input.placeholder = `我方陀螺 ${beyCount}`;
            container.appendChild(input);
        });

        document.getElementById('btn-add-stage').addEventListener('click', () => {
            createStageBlock();
        });

        async function fetchUserMatches() {
            const { data, error } = await gyroSupabase
                .from('matches_v2')
                .select('*')
                .order('date', { ascending: false });
            if (!error && data) {
                myMatches = data;
                renderDashboardAndList();
            }
        }

        // 🛠️ 核心修改：每輪賽事區塊（包含對手 3 顆陀螺 + 分數挑選）
        function createStageBlock() {
            const container = document.getElementById('stages-container');
            const stageIndex = container.children.length + 1;
            const block = document.createElement('div');
            block.className = 'stage-block bg-slate-900/60 p-3 rounded-xl border border-slate-700/80 space-y-2.5';
            block.innerHTML = `
                <div class="flex justify-between items-center border-b border-slate-700 pb-1.5">
                    <input type="text" class="stage-name-input bg-slate-800 border border-slate-600 rounded text-xs p-1 font-bold text-slate-100 h-7 w-2/5" placeholder="例如：預賽第一輪" required>
                    
                    <div class="flex items-center gap-1 text-xs">
                        <span class="text-slate-400 font-bold">比分:</span>
                        <select class="score-me bg-slate-900 border border-slate-700 rounded p-0.5 text-indigo-400 font-bold text-center w-10">
                            <option value="3">3</option><option value="2">2</option><option value="1">1</option><option value="0" selected>0</option><option value="4">4</option><option value="5">5</option>
                        </select>
                        <span class="text-slate-500 font-black">:</span>
                        <select class="score-opp bg-slate-900 border border-slate-700 rounded p-0.5 text-rose-400 font-bold text-center w-10">
                            <option value="3">3</option><option value="2">2</option><option value="1">1</option><option value="0" selected>0</option><option value="4">4</option><option value="5">5</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="text-[11px] font-bold text-slate-400 flex justify-between">
                        <span>👤 對手名字</span>
                        <span class="text-amber-400">🕵️ 對手戰用三陀螺陣容</span>
                    </div>
                    <div class="grid grid-cols-4 gap-1">
                        <input type="text" class="opp-name bg-slate-800 border border-slate-700 p-1.5 text-xs rounded text-slate-200" placeholder="名字" required>
                        <input type="text" class="opp-b1 bg-slate-800 border border-slate-700 p-1.5 text-xs rounded text-center text-amber-300" placeholder="陀螺 1">
                        <input type="text" class="opp-b2 bg-slate-800 border border-slate-700 p-1.5 text-xs rounded text-center text-amber-300" placeholder="陀螺 2">
                        <input type="text" class="opp-b3 bg-slate-800 border border-slate-700 p-1.5 text-xs rounded text-center text-amber-300" placeholder="陀螺 3">
                    </div>
                </div>
            `;
            container.appendChild(block);
            if(stageIndex === 1) block.querySelector('.stage-name-input').value = "預賽第一輪";
        }

        document.getElementById('match-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const mySetupsData = [];
            document.querySelectorAll('.my-bey-input').forEach(input => {
                if (input.value.trim()) mySetupsData.push(input.value.trim());
            });

            const stagesData = [];
            document.querySelectorAll('.stage-block').forEach(block => {
                const sMe = parseInt(block.querySelector('.score-me').value) || 0;
                const sOpp = parseInt(block.querySelector('.score-opp').value) || 0;
                
                // 從分數自動判斷晉級或淘汰
                const calculatedResult = sMe >= sOpp ? 'WIN' : 'LOSE';

                // 收集對手填寫的三顆陀螺
                const oppSetupsData = [
                    block.querySelector('.opp-b1').value.trim(),
                    block.querySelector('.opp-b2').value.trim(),
                    block.querySelector('.opp-b3').value.trim()
                ].filter(Boolean);

                stagesData.push({
                    stageName: block.querySelector('.stage-name-input').value,
                    oppName: block.querySelector('.opp-name').value,
                    oppSetups: oppSetupsData,
                    stageResult: calculatedResult,
                    score: `${sMe}-${sOpp}` // 把比分存進去資料庫
                });
            });

            const newMatch = {
                user_id: currentUser.id,
                date: document.getElementById('date').value,
                tournament: document.getElementById('tournament').value,
                players: document.getElementById('players').value,
                fee: Number(document.getElementById('fee').value) || 0,
                my_setups: mySetupsData,
                stages: stagesData
            };

            const { error } = await gyroSupabase.from('matches_v2').insert([newMatch]);
            if (error) {
                alert('上傳雲端失敗: ' + error.message);
            } else {
                alert('戰績與局數比分成功登記！');
                document.getElementById('match-form').reset();
                document.getElementById('my-beys-container').innerHTML = `
                    <input type="text" class="my-bey-input w-full p-1.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 text-center h-8" placeholder="我方陀螺 1" required>
                    <input type="text" class="my-bey-input w-full p-1.5 text-xs bg-slate-900 border border-slate-700 rounded-lg text-slate-200 text-center h-8" placeholder="我方陀螺 2">
                `;
                document.getElementById('stages-container').innerHTML = '';
                createStageBlock();
                fetchUserMatches();
            }
        });

        function renderDashboardAndList() {
            document.getElementById('stat-total').innerText = `${myMatches.length} 場`;
            const beyCounts = {};
            myMatches.forEach(m => {
                m.my_setups?.forEach(b => { if(b) beyCounts[b] = (beyCounts[b] || 0) + 1 });
            });
            const topBey = Object.entries(beyCounts).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('stat-top-beys').innerText = topBey ? `${topBey[0]} (${topBey[1]}次)` : '暫無數據';

            const listContainer = document.getElementById('records-list');
            listContainer.innerHTML = '';
            if(myMatches.length === 0) {
                listContainer.innerHTML = `<div class="text-center p-4 text-xs text-slate-500">目前您的雲端庫還沒有戰績紀錄喔！</div>`;
                return;
            }

            myMatches.forEach(m => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs space-y-1.5';
                let stagesHtml = '';
                m.stages?.forEach(s => {
                    // 顯示比分與對手三顆陀螺
                    const oppBeysStr = s.oppSetups && s.oppSetups.length > 0 ? ` ［${s.oppSetups.join(' / ')}］` : '';
                    stagesHtml += `
                        <div class="bg-slate-900/50 p-2 rounded border border-slate-700/50">
                            <div class="flex justify-between items-center font-bold">
                                <span class="text-slate-300">${s.stageName} <span class="text-slate-500 font-normal">vs</span> ${s.oppName}</span>
                                <span class="px-1.5 py-0.5 rounded text-[10px] ${s.stageResult === 'WIN' ? 'bg-emerald-950 text-emerald-400 border border-emerald-800':'bg-rose-950 text-rose-400 border border-rose-800'}">
                                    ${s.score || ''} ${s.stageResult === 'WIN' ? '晉級':'淘汰'}
                                </span>
                            </div>
                            ${oppBeysStr ? `<div class="text-[10px] text-amber-500/80 mt-1 font-medium">敵方陣容:${oppBeysStr}</div>` : ''}
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] text-slate-400">
                        <span>📅 ${m.date} | 👥 ${m.players || '未知'}</span>
                        <span class="text-indigo-400 font-bold">$${m.fee}</span>
                    </div>
                    <h4 class="font-black text-slate-200 text-sm">${m.tournament}</h4>
                    <div class="text-slate-400 text-[11px]">我方陣容: <span class="text-blue-400">${m.my_setups?.join(', ')}</span></div>
                    <div class="space-y-1 pt-1 border-t border-slate-700/40">${stagesHtml}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        createStageBlock();
    </script>
</body>
</html>
